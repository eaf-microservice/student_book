import java.util.Properties

pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
    def properties = new Properties()

    assert localPropertiesFile.exists()
    localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }

    def flutterSdkPath = properties.getProperty("flutter.sdk")
    assert flutterSdkPath != null, "flutter.sdk not set in local.properties"

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ':app'

// Configure namespaces for library modules from their AndroidManifest.xml
gradle.projectsLoaded { gradle ->
    gradle.rootProject.allprojects { project ->
        project.plugins.withId('com.android.library') {
            project.android {
                if (!namespace || namespace == null) {
                    def manifestFile = project.file('src/main/AndroidManifest.xml')
                    if (manifestFile.exists()) {
                        try {
                            def manifest = new groovy.xml.XmlParser().parse(manifestFile)
                            def pkgName = manifest.@'package'
                            if (pkgName) {
                                namespace = pkgName
                            }
                        } catch (e) {
                            println("Warning: Could not parse manifest for ${project.name}: ${e.message}")
                        }
                    }
                }
            }
        }
    }
}
