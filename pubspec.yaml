name: student_books
description: تطبيق يحتوي على كل ما يحتاجه الطالب في جامعة صفوة من كتب لتعلم
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 0.0.2+2
environment:
  sdk: ">=3.0.0 <4.0.0"

dependency_overrides:
  win32: ^5.5.0

dependencies:
  flutter:
    sdk: flutter
  animated_splash_screen: ^1.3.0
  syncfusion_flutter_pdfviewer: ^27.1.0
  url_launcher: ^6.1.10
  flutter_donation_buttons: ^0.1.6
  flutter_launcher_icons: ^0.14.4
  connectivity_plus: any
  device_info_plus: any
  google_mobile_ads: any
  cupertino_icons: ^1.0.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/data/books.json
    - assets/images/
    - assets/eaf/

    #=============Emplois des temps=====================
    - assets/emploi2Temp/

    #=============Couvres A1=====================
    - assets/couvreBooks/Annee1/

    #=============Couvres A2=====================
    - assets/couvreBooks/Annee2/

    #=============Couvres A3==========================
    - assets/couvreBooks/Annee3/

    #=============Couvres A4==========================
    - assets/couvreBooks/Annee4/